name: Sync Log Keys Check

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which sample(s) to run"
        required: true
        default: both
        type: choice
        options:
          - both
          - pass
          - fail
  push:
    paths:
      - 'docs/check_sync_log_keys.cmd'
      - 'docs/sync_client_abnormal_log_scenarios.md'
      - 'docs/samples/abnormal_sync_logs_*.txt'
      - '.github/workflows/sync-log-keys-check.yml'
  pull_request:
    paths:
      - 'docs/check_sync_log_keys.cmd'
      - 'docs/sync_client_abnormal_log_scenarios.md'
      - 'docs/samples/abnormal_sync_logs_*.txt'
      - '.github/workflows/sync-log-keys-check.yml'

jobs:
  verify-sync-log-keys:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PASS sample should pass
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'both' || github.event.inputs.scenario == 'pass' }}
        shell: cmd
        run: |
          call docs\check_sync_log_keys.cmd docs\samples\abnormal_sync_logs_pass.txt
          if %ERRORLEVEL% NEQ 0 (
            echo PASS sample failed unexpectedly. checker_exit_code=%ERRORLEVEL%
            echo ### PASS sample result>>"%GITHUB_STEP_SUMMARY%"
            echo - status=failed_unexpectedly>>"%GITHUB_STEP_SUMMARY%"
            echo - checker_exit_code=%ERRORLEVEL%>>"%GITHUB_STEP_SUMMARY%"
            echo.>>"%GITHUB_STEP_SUMMARY%"
            exit /b 1
          )
          echo ### PASS sample result>>"%GITHUB_STEP_SUMMARY%"
          echo - status=success_as_expected>>"%GITHUB_STEP_SUMMARY%"
          echo - checker_exit_code=0>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"

      - name: FAIL sample should fail
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'both' || github.event.inputs.scenario == 'fail' }}
        shell: cmd
        run: |
          call docs\check_sync_log_keys.cmd docs\samples\abnormal_sync_logs_fail.txt
          if %ERRORLEVEL% NEQ 0 (
            echo Expected failure confirmed.
            echo ### FAIL sample result>>"%GITHUB_STEP_SUMMARY%"
            echo - status=expected_failure_confirmed>>"%GITHUB_STEP_SUMMARY%"
            echo - checker_exit_code=%ERRORLEVEL%>>"%GITHUB_STEP_SUMMARY%"
            echo.>>"%GITHUB_STEP_SUMMARY%"
            exit /b 0
          )
          echo Expected failure, but checker returned success.
          echo ### FAIL sample result>>"%GITHUB_STEP_SUMMARY%"
          echo - status=unexpected_success>>"%GITHUB_STEP_SUMMARY%"
          echo - checker_exit_code=0>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
          exit /b 1

      - name: Samples should not contain sensitive key-values
        shell: cmd
        run: |
          setlocal EnableDelayedExpansion
          set FOUND=0
          for %%F in (docs\samples\abnormal_sync_logs_pass.txt docs\samples\abnormal_sync_logs_fail.txt) do (
            findstr /i /r /c:"token=" /c:"bearer=" /c:"authorization=" /c:"access_token=" /c:"refresh_token=" /c:"client_secret=" "%%F" >nul
            if !ERRORLEVEL! EQU 0 (
              echo Sensitive marker detected in %%F
              set FOUND=1
            )
          )

          if !FOUND! EQU 1 (
            echo ### Sensitive marker check>>"%GITHUB_STEP_SUMMARY%"
            echo - status=failed_sensitive_marker_detected>>"%GITHUB_STEP_SUMMARY%"
            echo - files=docs/samples/abnormal_sync_logs_pass.txt,docs/samples/abnormal_sync_logs_fail.txt>>"%GITHUB_STEP_SUMMARY%"
            echo.>>"%GITHUB_STEP_SUMMARY%"
            exit /b 1
          )

          echo ### Sensitive marker check>>"%GITHUB_STEP_SUMMARY%"
          echo - status=success_no_sensitive_markers>>"%GITHUB_STEP_SUMMARY%"
          echo - files=docs/samples/abnormal_sync_logs_pass.txt,docs/samples/abnormal_sync_logs_fail.txt>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
