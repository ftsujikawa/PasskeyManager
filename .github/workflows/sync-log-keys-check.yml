name: Sync Log Keys Check

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which sample(s) to run"
        required: true
        default: both
        type: choice
        options:
          - both
          - pass
          - fail
  push:
    paths:
      - 'README.md'
      - 'docs/check_sync_log_keys.cmd'
      - 'docs/sync_client_abnormal_log_scenarios.md'
      - 'docs/samples/abnormal_sync_logs_*.txt'
      - '.github/workflows/sync-log-keys-check.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'docs/check_sync_log_keys.cmd'
      - 'docs/sync_client_abnormal_log_scenarios.md'
      - 'docs/samples/abnormal_sync_logs_*.txt'
      - '.github/workflows/sync-log-keys-check.yml'

jobs:
  verify-sync-log-keys:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize step summary
        shell: cmd
        run: |
          echo ## Sync Log Keys Check>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
          echo ^| item ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| trigger ^| ${{ github.event_name }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| scenario ^| ${{ github.event.inputs.scenario || 'both' }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| checker_rule_count ^| 9 ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| checker_rules ^| 409_recovery,read_encrypted_vault_data,vault_unlock_ui_required,sensitive_markers_absent,operation_key_present,message_code_with_message,request_id_with_sync_failure,request_id_with_sync_start,failure_kind_with_sync_failure ^|>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"

      - name: Validate checker script exists
        id: checker_script
        shell: cmd
        run: |
          if exist docs\check_sync_log_keys.cmd exit /b 0
          echo Missing required checker script: docs\check_sync_log_keys.cmd
          echo ### Checker script>>"%GITHUB_STEP_SUMMARY%"
          echo ^| key ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| status ^| missing_required_file ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| file ^| docs/check_sync_log_keys.cmd ^|>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
          exit /b 1

      - name: Validate PASS sample file exists
        id: pass_sample_file
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'both' || github.event.inputs.scenario == 'pass' }}
        shell: cmd
        run: |
          if exist docs\samples\abnormal_sync_logs_pass.txt exit /b 0
          echo Missing required sample file: docs\samples\abnormal_sync_logs_pass.txt
          echo ### PASS sample file>>"%GITHUB_STEP_SUMMARY%"
          echo ^| key ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| status ^| missing_required_file ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| file ^| docs/samples/abnormal_sync_logs_pass.txt ^|>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
          exit /b 1

      - name: Validate FAIL sample file exists
        id: fail_sample_file
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'both' || github.event.inputs.scenario == 'fail' }}
        shell: cmd
        run: |
          if exist docs\samples\abnormal_sync_logs_fail.txt exit /b 0
          echo Missing required sample file: docs\samples\abnormal_sync_logs_fail.txt
          echo ### FAIL sample file>>"%GITHUB_STEP_SUMMARY%"
          echo ^| key ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| status ^| missing_required_file ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| file ^| docs/samples/abnormal_sync_logs_fail.txt ^|>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
          exit /b 1

      - name: PASS sample should pass
        id: pass_sample
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'both' || github.event.inputs.scenario == 'pass' }}
        shell: cmd
        run: |
          call docs\check_sync_log_keys.cmd docs\samples\abnormal_sync_logs_pass.txt > pass_sample_output.txt 2>&1
          set "CHECKER_RC=%ERRORLEVEL%"
          set "HAS_FAIL_PREFIX=0"
          set "HAS_409_PASS=0"
          set "HAS_READ_ENCRYPTED_VAULT_DATA_PASS=0"
          set "HAS_VAULT_UNLOCK_UI_REQUIRED_PASS=0"
          set "HAS_SENSITIVE_MARKERS_ABSENT_PASS=0"
          set "HAS_OPERATION_PASS=0"
          set "HAS_MESSAGE_CODE_PASS=0"
          set "HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS=0"
          set "HAS_REQUEST_ID_WITH_SYNC_START_PASS=0"
          set "HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS=0"
          findstr /b /c:"FAIL:" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_FAIL_PREFIX=1"
          findstr /b /c:"PASS: 409_recovery" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_409_PASS=1"
          findstr /b /c:"PASS: read_encrypted_vault_data" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_READ_ENCRYPTED_VAULT_DATA_PASS=1"
          findstr /b /c:"PASS: vault_unlock_ui_required" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_VAULT_UNLOCK_UI_REQUIRED_PASS=1"
          findstr /b /c:"PASS: sensitive_markers_absent" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_SENSITIVE_MARKERS_ABSENT_PASS=1"
          findstr /b /c:"PASS: operation_key_present" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_OPERATION_PASS=1"
          findstr /b /c:"PASS: message_code_with_message" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_MESSAGE_CODE_PASS=1"
          findstr /b /c:"PASS: request_id_with_sync_failure" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS=1"
          findstr /b /c:"PASS: request_id_with_sync_start" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_REQUEST_ID_WITH_SYNC_START_PASS=1"
          findstr /b /c:"PASS: failure_kind_with_sync_failure" pass_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS=1"
          set "PASS_PREFIX_COUNT=0"
          for /f %%A in ('findstr /b /c:"PASS:" pass_sample_output.txt ^| find /c ":"') do set "PASS_PREFIX_COUNT=%%A"
          if %CHECKER_RC% EQU 0 if %HAS_FAIL_PREFIX% EQU 0 if %HAS_409_PASS% EQU 1 if %HAS_READ_ENCRYPTED_VAULT_DATA_PASS% EQU 1 if %HAS_VAULT_UNLOCK_UI_REQUIRED_PASS% EQU 1 if %HAS_SENSITIVE_MARKERS_ABSENT_PASS% EQU 1 if %HAS_OPERATION_PASS% EQU 1 if %HAS_MESSAGE_CODE_PASS% EQU 1 if %HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS% EQU 1 if %HAS_REQUEST_ID_WITH_SYNC_START_PASS% EQU 1 if %HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS% EQU 1 if %PASS_PREFIX_COUNT% EQU 9 (
            echo ### PASS sample>>"%GITHUB_STEP_SUMMARY%"
            echo ^| key ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| status ^| success_as_expected ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| checker_exit_code ^| %CHECKER_RC% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_checker_exit_code ^| 0 ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| fail_prefix_detected ^| no ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_prefix_count ^| %PASS_PREFIX_COUNT% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_pass_prefix_count ^| 9 ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_409_recovery ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_read_encrypted_vault_data ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_vault_unlock_ui_required ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_sensitive_markers_absent ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_operation_key_present ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_message_code_with_message ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_request_id_with_sync_failure ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_request_id_with_sync_start ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| pass_reason_failure_kind_with_sync_failure ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo.>>"%GITHUB_STEP_SUMMARY%"
            exit /b 0
          )
          echo PASS sample did not satisfy expected pass conditions. checker_exit_code=%CHECKER_RC%
          type pass_sample_output.txt
          echo ### PASS sample>>"%GITHUB_STEP_SUMMARY%"
          echo ^| key ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| status ^| unexpected_pass_condition ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| checker_exit_code ^| %CHECKER_RC% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_checker_exit_code ^| 0 ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| pass_prefix_count ^| %PASS_PREFIX_COUNT% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_pass_prefix_count ^| 9 ^|>>"%GITHUB_STEP_SUMMARY%"
          if %HAS_FAIL_PREFIX% EQU 1 (
            echo ^| fail_prefix_detected ^| yes ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| fail_prefix_detected ^| no ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_409_PASS% EQU 1 (
            echo ^| pass_reason_409_recovery ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_409_recovery ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_READ_ENCRYPTED_VAULT_DATA_PASS% EQU 1 (
            echo ^| pass_reason_read_encrypted_vault_data ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_read_encrypted_vault_data ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_VAULT_UNLOCK_UI_REQUIRED_PASS% EQU 1 (
            echo ^| pass_reason_vault_unlock_ui_required ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_vault_unlock_ui_required ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_SENSITIVE_MARKERS_ABSENT_PASS% EQU 1 (
            echo ^| pass_reason_sensitive_markers_absent ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_sensitive_markers_absent ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_OPERATION_PASS% EQU 1 (
            echo ^| pass_reason_operation_key_present ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_operation_key_present ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_MESSAGE_CODE_PASS% EQU 1 (
            echo ^| pass_reason_message_code_with_message ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_message_code_with_message ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS% EQU 1 (
            echo ^| pass_reason_request_id_with_sync_failure ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_request_id_with_sync_failure ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_REQUEST_ID_WITH_SYNC_START_PASS% EQU 1 (
            echo ^| pass_reason_request_id_with_sync_start ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_request_id_with_sync_start ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          if %HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS% EQU 1 (
            echo ^| pass_reason_failure_kind_with_sync_failure ^| observed ^|>>"%GITHUB_STEP_SUMMARY%"
          ) else (
            echo ^| pass_reason_failure_kind_with_sync_failure ^| not_observed ^|>>"%GITHUB_STEP_SUMMARY%"
          )
          echo.>>"%GITHUB_STEP_SUMMARY%"
          exit /b 1

      - name: FAIL sample should fail
        id: fail_sample
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scenario == 'both' || github.event.inputs.scenario == 'fail' }}
        shell: cmd
        run: |
          call docs\check_sync_log_keys.cmd docs\samples\abnormal_sync_logs_fail.txt > fail_sample_output.txt 2>&1
          set "CHECKER_RC=%ERRORLEVEL%"
          set "HAS_409_RECOVERY_FAILURE=0"
          set "HAS_READ_ENCRYPTED_VAULT_DATA_FAILURE=0"
          set "HAS_CHECK_FAILURES_SUMMARY=0"
          set "HAS_VAULT_UNLOCK_UI_REQUIRED_PASS=0"
          set "HAS_SENSITIVE_MARKERS_ABSENT_PASS=0"
          set "HAS_OPERATION_KEY_PRESENT_PASS=0"
          set "HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS=0"
          set "HAS_REQUEST_ID_WITH_SYNC_START_PASS=0"
          set "HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS=0"
          findstr /b /c:"FAIL: message_code_with_message" fail_sample_output.txt >nul
          set "HAS_MESSAGE_CODE_FAILURE=0"
          if %ERRORLEVEL% EQU 0 set "HAS_MESSAGE_CODE_FAILURE=1"
          findstr /b /c:"FAIL: 409_recovery" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_409_RECOVERY_FAILURE=1"
          findstr /b /c:"FAIL: read_encrypted_vault_data" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_READ_ENCRYPTED_VAULT_DATA_FAILURE=1"
          findstr /b /c:"FAIL: check_failures=409_recovery,read_encrypted_vault_data,message_code_with_message" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_CHECK_FAILURES_SUMMARY=1"
          findstr /b /c:"PASS: vault_unlock_ui_required" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_VAULT_UNLOCK_UI_REQUIRED_PASS=1"
          findstr /b /c:"PASS: sensitive_markers_absent" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_SENSITIVE_MARKERS_ABSENT_PASS=1"
          findstr /b /c:"PASS: operation_key_present" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_OPERATION_KEY_PRESENT_PASS=1"
          findstr /b /c:"PASS: request_id_with_sync_failure" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS=1"
          findstr /b /c:"PASS: request_id_with_sync_start" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_REQUEST_ID_WITH_SYNC_START_PASS=1"
          findstr /b /c:"PASS: failure_kind_with_sync_failure" fail_sample_output.txt >nul
          if %ERRORLEVEL% EQU 0 set "HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS=1"
          set "STATUS_409_RECOVERY=not_observed"
          if %HAS_409_RECOVERY_FAILURE% EQU 1 set "STATUS_409_RECOVERY=observed"
          set "STATUS_READ_ENCRYPTED_VAULT_DATA=not_observed"
          if %HAS_READ_ENCRYPTED_VAULT_DATA_FAILURE% EQU 1 set "STATUS_READ_ENCRYPTED_VAULT_DATA=observed"
          set "STATUS_MESSAGE_CODE_WITH_MESSAGE=not_observed"
          if %HAS_MESSAGE_CODE_FAILURE% EQU 1 set "STATUS_MESSAGE_CODE_WITH_MESSAGE=observed"
          set "STATUS_CHECK_FAILURES_SUMMARY=not_observed"
          if %HAS_CHECK_FAILURES_SUMMARY% EQU 1 set "STATUS_CHECK_FAILURES_SUMMARY=observed"
          set "STATUS_VAULT_UNLOCK_UI_REQUIRED=not_observed"
          if %HAS_VAULT_UNLOCK_UI_REQUIRED_PASS% EQU 1 set "STATUS_VAULT_UNLOCK_UI_REQUIRED=observed"
          set "STATUS_SENSITIVE_MARKERS_ABSENT=not_observed"
          if %HAS_SENSITIVE_MARKERS_ABSENT_PASS% EQU 1 set "STATUS_SENSITIVE_MARKERS_ABSENT=observed"
          set "STATUS_OPERATION_KEY_PRESENT=not_observed"
          if %HAS_OPERATION_KEY_PRESENT_PASS% EQU 1 set "STATUS_OPERATION_KEY_PRESENT=observed"
          set "STATUS_REQUEST_ID_WITH_SYNC_FAILURE=not_observed"
          if %HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS% EQU 1 set "STATUS_REQUEST_ID_WITH_SYNC_FAILURE=observed"
          set "STATUS_REQUEST_ID_WITH_SYNC_START=not_observed"
          if %HAS_REQUEST_ID_WITH_SYNC_START_PASS% EQU 1 set "STATUS_REQUEST_ID_WITH_SYNC_START=observed"
          set "STATUS_FAILURE_KIND_WITH_SYNC_FAILURE=not_observed"
          if %HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS% EQU 1 set "STATUS_FAILURE_KIND_WITH_SYNC_FAILURE=observed"
          set "FAIL_PREFIX_COUNT=0"
          for /f %%A in ('findstr /b /c:"FAIL:" fail_sample_output.txt ^| find /c ":"') do set "FAIL_PREFIX_COUNT=%%A"
          if %CHECKER_RC% EQU 1 if %HAS_409_RECOVERY_FAILURE% EQU 1 if %HAS_READ_ENCRYPTED_VAULT_DATA_FAILURE% EQU 1 if %HAS_MESSAGE_CODE_FAILURE% EQU 1 if %HAS_CHECK_FAILURES_SUMMARY% EQU 1 if %HAS_VAULT_UNLOCK_UI_REQUIRED_PASS% EQU 1 if %HAS_SENSITIVE_MARKERS_ABSENT_PASS% EQU 1 if %HAS_OPERATION_KEY_PRESENT_PASS% EQU 1 if %HAS_REQUEST_ID_WITH_SYNC_FAILURE_PASS% EQU 1 if %HAS_REQUEST_ID_WITH_SYNC_START_PASS% EQU 1 if %HAS_FAILURE_KIND_WITH_SYNC_FAILURE_PASS% EQU 1 if %FAIL_PREFIX_COUNT% EQU 4 (
            echo Expected failure confirmed.
            echo ### FAIL sample>>"%GITHUB_STEP_SUMMARY%"
            echo ^| key ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| status ^| expected_failure_confirmed ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| checker_exit_code ^| %CHECKER_RC% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_checker_exit_code ^| 1 ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| fail_prefix_count ^| %FAIL_PREFIX_COUNT% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_fail_prefix_count ^| 4 ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_reason_409_recovery ^| %STATUS_409_RECOVERY% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_reason_read_encrypted_vault_data ^| %STATUS_READ_ENCRYPTED_VAULT_DATA% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_reason_message_code_with_message ^| %STATUS_MESSAGE_CODE_WITH_MESSAGE% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_reason_check_failures_summary ^| %STATUS_CHECK_FAILURES_SUMMARY% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_pass_reason_vault_unlock_ui_required ^| %STATUS_VAULT_UNLOCK_UI_REQUIRED% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_pass_reason_sensitive_markers_absent ^| %STATUS_SENSITIVE_MARKERS_ABSENT% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_pass_reason_operation_key_present ^| %STATUS_OPERATION_KEY_PRESENT% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_pass_reason_request_id_with_sync_failure ^| %STATUS_REQUEST_ID_WITH_SYNC_FAILURE% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_pass_reason_request_id_with_sync_start ^| %STATUS_REQUEST_ID_WITH_SYNC_START% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo ^| expected_pass_reason_failure_kind_with_sync_failure ^| %STATUS_FAILURE_KIND_WITH_SYNC_FAILURE% ^|>>"%GITHUB_STEP_SUMMARY%"
            echo.>>"%GITHUB_STEP_SUMMARY%"
            exit /b 0
          )
          echo Expected failure with 409_recovery, read_encrypted_vault_data, message_code_with_message, check_failures summary, and expected PASS reasons, but condition was not met.
          type fail_sample_output.txt
          echo ### FAIL sample>>"%GITHUB_STEP_SUMMARY%"
          echo ^| key ^| value ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| status ^| unexpected_fail_condition ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| checker_exit_code ^| %CHECKER_RC% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_checker_exit_code ^| 1 ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| fail_prefix_count ^| %FAIL_PREFIX_COUNT% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_fail_prefix_count ^| 4 ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_reason_409_recovery ^| %STATUS_409_RECOVERY% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_reason_read_encrypted_vault_data ^| %STATUS_READ_ENCRYPTED_VAULT_DATA% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_reason_message_code_with_message ^| %STATUS_MESSAGE_CODE_WITH_MESSAGE% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_reason_check_failures_summary ^| %STATUS_CHECK_FAILURES_SUMMARY% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_pass_reason_vault_unlock_ui_required ^| %STATUS_VAULT_UNLOCK_UI_REQUIRED% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_pass_reason_sensitive_markers_absent ^| %STATUS_SENSITIVE_MARKERS_ABSENT% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_pass_reason_operation_key_present ^| %STATUS_OPERATION_KEY_PRESENT% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_pass_reason_request_id_with_sync_failure ^| %STATUS_REQUEST_ID_WITH_SYNC_FAILURE% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_pass_reason_request_id_with_sync_start ^| %STATUS_REQUEST_ID_WITH_SYNC_START% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| expected_pass_reason_failure_kind_with_sync_failure ^| %STATUS_FAILURE_KIND_WITH_SYNC_FAILURE% ^|>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
          exit /b 1

      - name: Samples should not contain sensitive key-values
        id: sensitive_markers
        shell: pwsh
        run: |
          $scenario = '${{ github.event.inputs.scenario || ''both'' }}'
          if ('${{ github.event_name }}' -ne 'workflow_dispatch' -or $scenario -eq 'both') {
            $files = @(
              'docs/samples/abnormal_sync_logs_pass.txt',
              'docs/samples/abnormal_sync_logs_fail.txt'
            )
          }
          elseif ($scenario -eq 'pass') {
            $files = @('docs/samples/abnormal_sync_logs_pass.txt')
          }
          else {
            $files = @('docs/samples/abnormal_sync_logs_fail.txt')
          }
          $pattern = '(?i)(token=|bearer=|authorization=|authorization:|access_token=|refresh_token=|client_secret=)'
          $hitFiles = @()

          foreach ($file in $files) {
            if (Select-String -Path $file -Pattern $pattern -Quiet) {
              Write-Host "Sensitive marker detected in $file"
              $hitFiles += $file
            }
          }

          "### Sensitive marker check" >> $env:GITHUB_STEP_SUMMARY
          "| key | value |" >> $env:GITHUB_STEP_SUMMARY
          "|---|---|" >> $env:GITHUB_STEP_SUMMARY

          if ($hitFiles.Count -gt 0) {
            "| status | failed_sensitive_marker_detected |" >> $env:GITHUB_STEP_SUMMARY
            "| files | $($hitFiles -join ',') |" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            exit 1
          }

          "| status | success_no_sensitive_markers |" >> $env:GITHUB_STEP_SUMMARY
          "| files | $($files -join ',') |" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          exit 0

      - name: Upload checker outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-keys-checker-outputs
          if-no-files-found: ignore
          path: |
            pass_sample_output.txt
            fail_sample_output.txt

      - name: Overall summary
        if: always()
        shell: cmd
        run: |
          echo ### Overall result>>"%GITHUB_STEP_SUMMARY%"
          echo ^| check ^| outcome ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^|---^|---^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| checker_script ^| ${{ steps.checker_script.outcome || 'skipped' }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| pass_sample_file ^| ${{ steps.pass_sample_file.outcome || 'skipped' }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| fail_sample_file ^| ${{ steps.fail_sample_file.outcome || 'skipped' }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| pass_sample ^| ${{ steps.pass_sample.outcome || 'skipped' }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| fail_sample ^| ${{ steps.fail_sample.outcome || 'skipped' }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| sensitive_markers ^| ${{ steps.sensitive_markers.outcome || 'skipped' }} ^|>>"%GITHUB_STEP_SUMMARY%"
          echo ^| enforced_rules ^| 409_recovery,read_encrypted_vault_data,vault_unlock_ui_required,sensitive_markers_absent,operation_key_present,message_code_with_message,request_id_with_sync_failure,request_id_with_sync_start,failure_kind_with_sync_failure ^|>>"%GITHUB_STEP_SUMMARY%"
          echo.>>"%GITHUB_STEP_SUMMARY%"
